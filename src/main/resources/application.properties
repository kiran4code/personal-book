spring.application.name=demo
google.books.base-url=https://www.googleapis.com/books/v1
google.books.api-key=${GOOGLE_BOOKS_API_KEY:}
google.books.timeout-ms=5000

# ---------- H2 Datasource ----------
spring.datasource.url=jdbc:h2:mem:personalbook;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- H2 Console (optional) ----------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
